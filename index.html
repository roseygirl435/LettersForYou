<style>

/* =========================
   🌈 MAIN BACKGROUND
   ========================= */
body{
    margin:0;
    font-family:Georgia,serif;
    background:#932F67;
    min-height:100vh;
}


/* =========================
   💖 HEADER
   ========================= */
header{

    padding:25px;

h4{

    font-family:'Dancing Script',cursive;

h1{

}

    font-family:'Allura',cursive;

}


/* =========================
   📌 NAVBAR (DESKTOP)
   ========================= */
nav{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    padding:15px;
}


/* =========================
   🔘 BUTTONS
   ========================= */
button{
    border:none;
    border-radius:20px;
    padding:10px 18px;
    cursor:pointer;

    background:#F19ED2;
    font-family:"Pacifico",cursive;
    letter-spacing:2px;
    color:white;
}

button.active{
    background:#F075AE;
}


/* =========================
   📖 MAIN CONTENT
   ========================= */
main{
    max-width:900px;
    margin:auto;
    padding:20px;
    transition:0.3s ease;
}


/* =========================
   💌 LETTER BOX
   ========================= */
.letter{
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 5px 25px rgba(0,0,0,.1);

    line-height:1.3;
    font-size:1.7em;
    font-family:'Allura',cursive;
    color:#ed3fb3;
}


/* =========================
   📱 MOBILE STYLES
   ========================= */
@media(max-width:700px){

    h1{
        font-size:1.7em;
        padding-left:40px; /* prevent overlap with button */
    }

    .letter{
        padding:22px;
        font-size:1em;
    }

    #menuToggle{
    display:block;
    position:fixed;   /* 👈 IMPORTANT FIX */
    top:15px;
    left:15px;
    z-index:9999;

    padding:10px 14px;
    border:none;
    border-radius:12px;
    background:transparent;   /* 👈 transparent */
    color:white;              /* icon color */
font-size:26px;   /* size of 💕 */
    cursor:pointer

    touch-action:manipulation;

   #menuToggle:active{

        top:0;
        left:-260px;

        flex-wrap:nowrap;

}

    border-radius:10px;

/* Hide on desktop ONLY */
@media(min-width:701px){

        display:none;
    }

body.menu-open{
    overflow:hidden;   /* 👈 prevents page from scrolling */

let nav = document.getElementById("nav");
let content = document.getElementById("content");

function load(){
nav.innerHTML="";
letters.forEach((l,i)=>{
let btn=document.createElement("button");
btn.textContent=l.title;
btn.onclick=()=>show(i);
if(i===0)btn.classList.add("active");
nav.appendChild(btn);
});
show(0);
}

function show(i){
    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
    nav.children[i].classList.add("active");

    content.innerHTML=`
    <div class="letter">
    <pre style="white-space:pre-wrap;font-family:inherit">${letters[i].text}</pre>
    </div>`;

   if(window.innerWidth <= 700){
    nav.classList.remove("show");
    content.classList.remove("shift");
    document.body.classList.remove("menu-open"); // 👈 IMPORTANT
}
}

load();

let toggleBtn = document.getElementById("menuToggle");

toggleBtn.onclick = () => {
    nav.classList.toggle("show");
    content.classList.toggle("shift");
    document.body.classList.toggle("menu-open"); // 👈 IMPORTANT
};
</script>
